name: MLOps CI Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-and-dockerize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install MLflow & Dependencies
        run: |
          pip install mlflow pandas scikit-learn dagshub matplotlib seaborn

      - name: Run MLProject (Training & Logging ke DagsHub)
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/AlifFauzan21/SMSML_Alif-Fauzan.mlflow
          MLFLOW_TRACKING_USERNAME: AlifFauzan21
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd Workflow-CI/MLProject
          mlflow run . --env-manager=local

      - name: Build Docker Image via MLflow
        run: |
          cd Workflow-CI/MLProject
          mlflow models build-docker -m local_model -n ${{ secrets.DOCKER_USERNAME }}/breast_cancer_model:latest --env-manager conda

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image ke Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/breast_cancer_model:latest
